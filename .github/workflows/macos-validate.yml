name: macos-validate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Optional artifact version (defaults to CI version)"
        required: false
        type: string

jobs:
  validate-macos:
    name: validate-macos-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: macos-15-intel
            runner_label: macos-15-intel
          - arch: arm64
            runner: macos-15
            runner_label: macos-15
    env:
      PYTHONUTF8: "1"
      GA_MACOS_RUNNER_LABEL: ${{ matrix.runner_label }}
      GA_MACOS_EXPECTED_ARCH: ${{ matrix.arch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve validation version
        id: ver
        shell: bash
        run: |
          v="${{ github.event.inputs.version }}"
          if [ -z "$v" ]; then
            v="0.0.0-ci.${GITHUB_RUN_NUMBER}"
          fi
          echo "value=$v" >> "$GITHUB_OUTPUT"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest ruff
          python -m pip install pyinstaller==6.17.0

      - name: Mac preflight quality gate
        shell: bash
        run: |
          python tools/check_launcher_quality.py --scope macos-preflight

      - name: Run tests
        shell: bash
        run: |
          python -m pytest tests -q

      - name: Source startup smoke
        shell: bash
        env:
          GA_LAUNCHER_SMOKE_EXIT_MS: "1200"
          QT_QPA_PLATFORM: offscreen
        run: |
          python launcher.py

      - name: Build macOS app and dmg
        shell: bash
        run: |
          python tools/build_macos_release.py \
            --version "${{ steps.ver.outputs.value }}" \
            --out release \
            --commit "${{ github.sha }}"

      - name: Packaged app import smoke
        shell: bash
        env:
          GA_LAUNCHER_PACKAGED_IMPORT_SMOKE: "1"
        run: |
          v="${{ steps.ver.outputs.value }}"
          app="release/$v/macos/GenericAgent Launcher.app/Contents/MacOS/GenericAgentLauncher"
          if [ ! -e "$app" ]; then
            echo "Packaged app executable not found: $app" >&2
            exit 1
          fi
          set +e
          output="$("$app" 2>&1)"
          status=$?
          set -e
          echo "$output"
          if [ "$status" -ne 0 ]; then
            echo "Packaged app import smoke exited with status $status" >&2
            exit "$status"
          fi
          echo "$output" | grep -q "PACKAGED_IMPORT_SMOKE_OK"

      - name: Packaged app startup smoke
        shell: bash
        env:
          GA_LAUNCHER_SMOKE_EXIT_MS: "1200"
          QT_QPA_PLATFORM: offscreen
        run: |
          v="${{ steps.ver.outputs.value }}"
          app="release/$v/macos/GenericAgent Launcher.app/Contents/MacOS/GenericAgentLauncher"
          if [ ! -e "$app" ]; then
            echo "Packaged app executable not found: $app" >&2
            exit 1
          fi
          "$app"

      - name: Runner and bundle diagnostics
        shell: bash
        run: |
          v="${{ steps.ver.outputs.value }}"
          app="release/$v/macos/GenericAgent Launcher.app"
          bin="$app/Contents/MacOS/GenericAgentLauncher"
          echo "Runner label: $GA_MACOS_RUNNER_LABEL"
          echo "Expected arch: $GA_MACOS_EXPECTED_ARCH"
          uname -m
          sw_vers
          file "$bin"
          lipo -info "$bin"
          codesign -dv --verbose=4 "$app" || true
          codesign --verify --deep --strict "$app"
          spctl --assess --type execute --verbose=4 "$app" || true

      - name: Validate macOS release contract
        shell: bash
        run: |
          python tools/validate_macos_release.py \
            --version "${{ steps.ver.outputs.value }}" \
            --out release \
            --expected-commit "${{ github.sha }}" \
            --expected-arch "$GA_MACOS_EXPECTED_ARCH" \
            --expected-runner-label "$GA_MACOS_RUNNER_LABEL"

      - name: Upload macOS validation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: launcher-macos-validate-${{ matrix.arch }}-${{ steps.ver.outputs.value }}
          path: |
            release/${{ steps.ver.outputs.value }}/macos/**
